# Example Compose file for running piguild in Docker.
#
# From the piguild repo root (parent of this file):
#   mkdir -p config workspace pi-config/agent
#   cp piguild.config.example.json config/piguild.config.json
#   touch config/.env
#   docker compose -f compose.example.yaml up --build
#
# Volumes:
#   ./config     → /app/config     (piguild.config.json, state, optional .env for compose)
#   ./pi-config  → /root/.pi        (Pi agent home: settings, auth, sessions)
#   ./workspace  → /workspace       (optional working tree for the agent)

services:
  piguild:
    build:
      context: .
      dockerfile: Dockerfile.example
    container_name: piguild
    restart: unless-stopped
    env_file:
      - ./config/.env
    environment:
      - PIGUILD_CONFIG=/app/config/piguild.config.json
    volumes:
      - ./workspace:/workspace:rw
      - ./config:/app/config:rw
      - ./pi-config:/root/.pi:rw
